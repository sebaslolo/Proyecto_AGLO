<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | AGLO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="login.css">
</head>
<body>

 <!--fondo -->

    <section class="fondo">
        <div class="overlay"></div>


        <header class="navbar">
            <!-- Logo -->
            <div class="logo">
                <img src="img/logoAglo.png" alt="Logo AGLO">
                <h2>AGLO</h2>
            </div>
            <!-- menu -->
            <nav>
                <!-- Botón Login -->
                <a href="login.html" class="btnLogin">
                    Inicio Sesión
                </a>
                <!-- Botón Registro -->
                <a href="registro.html" class="btnRegistro">
                    Registrarse
                </a>
            </nav>
        </header>

        <!--=div contenedor -->

        <main class="contenedor">
            <div class="cardRegistro">
                <h1>Crear cuenta</h1>
                <form id="formRegistro">
                    <!-- nombre -->
                    <div class="grupo">
                        <label for="nombre">Nombre Completo</label>
                        <input
                            type="text"
                            id="nombre"
                            placeholder="Ej. María López">
                        <small id="errorNombre"></small>
                    </div>
                    <!-- Correo -->
                    <div class="grupo">
                        <label for="correo">Correo electrónico</label>
                        <input
                            type="email"
                            id="correo"
                            placeholder="ejemplo@correo.com">
                        <small id="errorCorreo"></small>
                    </div>
                    <!-- Contraseña -->
                    <div class="grupo">
                        <label for="password">Contraseña</label>
                        <div class="inputPassword">
                            <input
                                type="password"
                                id="password"
                                placeholder="********">
                            <i class="fa-regular fa-eye-slash ojo"></i>
                        </div>
                        <small id="errorPassword"></small>
                    </div>
                    <!-- Confirmar Contraseña -->
                    <div class="grupo">
                        <label for="confirmar">Confirmar contraseña</label>
                        <div class="inputPassword">
                            <input
                                type="password"
                                id="confirmar"
                                placeholder="********">
                            <i class="fa-regular fa-eye-slash ojo"></i>
                        </div>
                        <small id="errorConfirmar"></small>
                    </div>
                    <!-- Botón -->
                    <button type="submit" class="btnCrear">
                        Registrarse
                    </button>
                    <!-- Iniciar sesión -->
                    <p class="login">
                        ¿Ya tienes cuenta?
                        <a href="login.html">Inicia sesión</a>
                    </p>
                </form>
            </div>
        </main>

        <!--flecha para regresar-->

        <div class="flecha">
            <i class="fa-solid fa-chevron-right"></i>
        </div>
    </section>

    <!--js -->

    <script src="login.js"></script>

</body>

</html>
