<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{aglo/fragmentos :: head('Usuario | AGLO', 'dashboard.css')}"></head>
    <body class="admin-page">
        <header th:replace="~{admin/fragmentos :: nav}"></header>
        <main class="admin-main">
            <section class="admin-page-title">
                <div>
                    <h1 th:text="${usuario.idUsuario == null ? 'Crear usuario' : 'Editar usuario'}">Usuario</h1>
                    <p>Complete los datos de acceso, estado y rol.</p>
                </div>
            </section>
            <section th:replace="~{admin/fragmentos :: mensajes}"></section>

            <section class="admin-panel">
                <form th:action="@{/admin/usuarios/guardar}" th:object="${usuario}" method="post" class="was-validated">
                    <input type="hidden" th:field="*{idUsuario}"/>
                    <div class="form-grid">
                        <div>
                            <label class="form-label" for="username">Usuario</label>
                            <input class="form-control" type="text" th:field="*{username}" maxlength="30" required/>
                        </div>
                        <div>
                            <label class="form-label" for="password">Contraseña</label>
                            <input class="form-control" type="text" th:field="*{password}" maxlength="512" required/>
                        </div>
                        <div>
                            <label class="form-label" for="nombre">Nombre</label>
                            <input class="form-control" type="text" th:field="*{nombre}" maxlength="20" required/>
                        </div>
                        <div>
                            <label class="form-label" for="apellidoPaterno">Apellido paterno</label>
                            <input class="form-control" type="text" th:field="*{apellidoPaterno}" maxlength="30" required/>
                        </div>
                        <div>
                            <label class="form-label" for="apellidoMaterno">Apellido materno</label>
                            <input class="form-control" type="text" th:field="*{apellidoMaterno}" maxlength="30"/>
                        </div>
                        <div>
                            <label class="form-label" for="correo">Correo electrónico</label>
                            <input class="form-control" type="email" th:field="*{correo}" maxlength="75"/>
                        </div>
                        <div>
                            <label class="form-label" for="telefono">Teléfono</label>
                            <input class="form-control" type="text" th:field="*{telefono}" maxlength="25"/>
                        </div>
                        <div>
                            <label class="form-label" for="idEstado">Estado</label>
                            <select class="form-select" id="idEstado" name="estado.idEstado" required>
                                <option value="">Seleccione</option>
                                <option th:each="estado : ${estados}"
                                        th:value="${estado.idEstado}"
                                        th:selected="${usuario.estado != null and usuario.estado.idEstado == estado.idEstado}"
                                        th:text="${estado.nombreEstado}">Activo</option>
                            </select>
                        </div>
                        <div class="full-row">
                            <label class="form-label" for="idRol">Rol</label>
                            <select class="form-select" id="idRol" name="idRol">
                                <option value="">Sin rol</option>
                                <option th:each="rol : ${roles}"
                                        th:value="${rol.idRol}"
                                        th:selected="${idRol != null and idRol == rol.idRol}"
                                        th:text="${rol.rol}">CLIENTE</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <a class="btn btn-outline-dark" th:href="@{/admin/usuarios/listado}">Cancelar</a>
                        <button class="btn btn-success" type="submit"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
                    </div>
                </form>
            </section>
        </main>
        <th:block th:replace="~{aglo/fragmentos :: scripts('dashboard.js')}"></th:block>
    </body>
</html>
