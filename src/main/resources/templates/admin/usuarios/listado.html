<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{aglo/fragmentos :: head('Usuarios | AGLO', 'dashboard.css')}"></head>
    <body class="admin-page">
        <header th:replace="~{admin/fragmentos :: nav}"></header>
        <main class="admin-main">
            <section class="admin-page-title">
                <div>
                    <h1>Usuarios</h1>
                    <p>Listado y mantenimiento de usuarios registrados.</p>
                </div>
                <a class="btn btn-light" th:href="@{/admin/usuarios/nuevo}">
                    <i class="fa-solid fa-plus"></i> Crear usuario
                </a>
            </section>
            <section th:replace="~{admin/fragmentos :: mensajes}"></section>

            <section class="admin-panel">
                <form class="search-form mb-3" th:action="@{/admin/usuarios/listado}" method="get">
                    <input class="form-control form-control-sm" type="search" name="q" th:value="${q}" placeholder="Buscar por nombre o correo"/>
                    <button class="btn btn-sm btn-outline-dark" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                </form>

                <div class="table-responsive">
                    <table class="table admin-table align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Correo</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Fecha registro</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${usuarios == null or usuarios.empty}">
                                <td colspan="7" class="empty-row">No hay usuarios registrados.</td>
                            </tr>
                            <tr th:each="usuario : ${usuarios}">
                                <td th:text="${usuario.idUsuario}">1</td>
                                <td th:text="${usuario.nombre + ' ' + usuario.apellidoPaterno}">Nombre</td>
                                <td th:text="${usuario.correo}">correo@aglo.cr</td>
                                <td th:text="${rolesPorUsuario[usuario.idUsuario] != null and !rolesPorUsuario[usuario.idUsuario].isEmpty() ? rolesPorUsuario[usuario.idUsuario] : 'Sin rol'}">CLIENTE</td>
                                <td th:text="${usuario.estado != null ? usuario.estado.nombreEstado : 'Sin estado'}">Activo</td>
                                <td th:text="${usuario.fechaCreacion != null ? #temporals.format(usuario.fechaCreacion, 'dd/MM/yyyy') : 'Sin fecha'}">01/01/2026</td>
                                <td class="text-end">
                                    <a class="btn btn-sm btn-outline-dark" th:href="@{/admin/usuarios/modificar/{id}(id=${usuario.idUsuario})}">
                                        <i class="fa-solid fa-pen"></i> Editar
                                    </a>
                                    <button class="btn btn-sm btn-outline-danger" type="button"
                                            data-bs-toggle="modal" data-bs-target="#confirmDeleteModal"
                                            th:data-delete-id="${usuario.idUsuario}"
                                            th:data-delete-name="${usuario.nombre + ' ' + usuario.apellidoPaterno}">
                                        <i class="fa-solid fa-trash"></i> Eliminar
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <form th:action="@{/admin/usuarios/eliminar}" method="post">
                        <input type="hidden" name="idUsuario" id="deleteId"/>
                        <div class="modal-header bg-warning">
                            <h2 class="modal-title fs-5">Confirmar eliminación</h2>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                        </div>
                        <div class="modal-body">
                            <p>¿Desea eliminar <strong id="deleteName">este registro</strong>?</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-danger">Eliminar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <th:block th:replace="~{aglo/fragmentos :: scripts('dashboard.js')}"></th:block>
    </body>
</html>
