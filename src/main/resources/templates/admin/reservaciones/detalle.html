<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{aglo/fragmentos :: head('Detalle de reservación | AGLO', 'dashboard.css')}"></head>
    <body class="admin-page">
        <header th:replace="~{admin/fragmentos :: nav}"></header>
        <main class="admin-main">
            <section class="admin-page-title">
                <div>
                    <h1 th:text="${'Reservación #' + reservacion.idReservacion}">Reservación</h1>
                    <p th:text="${reservacion.usuario != null ? reservacion.usuario.nombre + ' ' + reservacion.usuario.apellidoPaterno : 'Sin usuario'}">Cliente</p>
                </div>
                <a class="btn btn-light" th:href="@{/admin/reservaciones/listado}">Regresar</a>
            </section>
            <section th:replace="~{admin/fragmentos :: mensajes}"></section>

            <section class="admin-panel">
                <div class="summary-grid">
                    <div class="summary-card">
                        <i class="fa-solid fa-calendar"></i>
                        <span>Fecha</span>
                        <strong th:text="${reservacion.fechaReservacion != null ? #temporals.format(reservacion.fechaReservacion, 'dd/MM/yyyy') : 'Sin fecha'}">Fecha</strong>
                    </div>
                    <div class="summary-card">
                        <i class="fa-solid fa-money-bill"></i>
                        <span>Monto</span>
                        <strong th:text="${reservacion.montoTotal != null ? #numbers.formatCurrency(reservacion.montoTotal) : '₡0'}">₡0</strong>
                    </div>
                    <div class="summary-card">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>Estado</span>
                        <strong th:text="${reservacion.estado != null ? reservacion.estado.nombreEstado : 'Sin estado'}">Pendiente</strong>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table admin-table align-middle">
                        <thead>
                            <tr>
                                <th>Actividad</th>
                                <th>Personas</th>
                                <th>Precio unitario</th>
                                <th>Subtotal</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${detalles == null or detalles.empty}">
                                <td colspan="5" class="empty-row">No hay detalle para esta reservación.</td>
                            </tr>
                            <tr th:each="detalle : ${detalles}">
                                <td th:text="${detalle.actividad != null ? detalle.actividad.nombreActividad : 'Sin actividad'}">Actividad</td>
                                <td th:text="${detalle.cantidadPersonas}">1</td>
                                <td th:text="${detalle.precioUnitario != null ? #numbers.formatCurrency(detalle.precioUnitario) : '₡0'}">₡0</td>
                                <td th:text="${detalle.subtotal != null ? #numbers.formatCurrency(detalle.subtotal) : '₡0'}">₡0</td>
                                <td th:text="${detalle.estado != null ? detalle.estado.nombreEstado : 'Sin estado'}">Pendiente</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <th:block th:replace="~{aglo/fragmentos :: scripts('dashboard.js')}"></th:block>
    </body>
</html>
