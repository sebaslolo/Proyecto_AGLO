<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{aglo/fragmentos :: head('Reservaciones | AGLO', 'dashboard.css')}"></head>
    <body class="admin-page">
        <header th:replace="~{admin/fragmentos :: nav}"></header>
        <main class="admin-main">
            <section class="admin-page-title">
                <div>
                    <h1>Reservaciones</h1>
                    <p>Seguimiento administrativo de reservaciones.</p>
                </div>
            </section>
            <section th:replace="~{admin/fragmentos :: mensajes}"></section>

            <section class="admin-panel">
                <div class="table-responsive">
                    <table class="table admin-table align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Fecha</th>
                                <th>Monto</th>
                                <th>Estado</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${reservaciones == null or reservaciones.empty}">
                                <td colspan="6" class="empty-row">No hay reservaciones registradas.</td>
                            </tr>
                            <tr th:each="reservacion : ${reservaciones}">
                                <td th:text="${reservacion.idReservacion}">1</td>
                                <td th:text="${reservacion.usuario != null ? reservacion.usuario.nombre + ' ' + reservacion.usuario.apellidoPaterno : 'Sin usuario'}">Cliente</td>
                                <td th:text="${reservacion.fechaReservacion != null ? #temporals.format(reservacion.fechaReservacion, 'dd/MM/yyyy HH:mm') : 'Sin fecha'}">Fecha</td>
                                <td th:text="${reservacion.montoTotal != null ? #numbers.formatCurrency(reservacion.montoTotal) : 'Sin monto'}">₡0</td>
                                <td th:text="${reservacion.estado != null ? reservacion.estado.nombreEstado : 'Sin estado'}">Pendiente</td>
                                <td class="text-end">
                                    <a class="btn btn-sm btn-outline-dark" th:href="@{/admin/reservaciones/detalle/{id}(id=${reservacion.idReservacion})}">
                                        <i class="fa-solid fa-eye"></i> Detalle
                                    </a>
                                    <button class="btn btn-sm btn-outline-danger" type="button"
                                            data-bs-toggle="modal" data-bs-target="#confirmDeleteModal"
                                            th:data-delete-id="${reservacion.idReservacion}"
                                            th:data-delete-name="${'reservación #' + reservacion.idReservacion}">
                                        <i class="fa-solid fa-trash"></i> Eliminar
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <form th:action="@{/admin/reservaciones/eliminar}" method="post">
                        <input type="hidden" name="idReservacion" id="deleteId"/>
                        <div class="modal-header bg-warning">
                            <h2 class="modal-title fs-5">Confirmar eliminación</h2>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                        </div>
                        <div class="modal-body">
                            <p>¿Desea eliminar <strong id="deleteName">este registro</strong>?</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-danger">Eliminar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <th:block th:replace="~{aglo/fragmentos :: scripts('dashboard.js')}"></th:block>
    </body>
</html>
