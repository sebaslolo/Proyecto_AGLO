<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{aglo/fragmentos :: head('Asignación de guías | AGLO', 'dashboard.css')}"></head>
    <body class="admin-page">
        <header th:replace="~{admin/fragmentos :: nav}"></header>
        <main class="admin-main">
            <section class="admin-page-title">
                <div>
                    <h1>Asignar guías</h1>
                    <p th:text="${actividad != null ? actividad.nombreActividad : 'Actividad'}">Actividad</p>
                </div>
                <a class="btn btn-light" th:href="@{/admin/actividades/listado}">Regresar</a>
            </section>
            <section th:replace="~{admin/fragmentos :: mensajes}"></section>

            <section class="admin-panel">
                <form class="form-grid" th:action="@{/admin/actividades/{id}/guias/guardar(id=${idActividad})}" method="post">
                    <div>
                        <label class="form-label" for="idGuia">Guía</label>
                        <select class="form-select" id="idGuia" name="idGuia" required>
                            <option value="">Seleccione</option>
                            <option th:each="guia : ${guias}"
                                    th:value="${guia.idGuia}"
                                    th:text="${guia.usuario != null ? guia.usuario.nombre + ' ' + guia.usuario.apellidoPaterno : 'Guía #' + guia.idGuia}">Guía</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label" for="idEstado">Estado</label>
                        <select class="form-select" id="idEstado" name="idEstado" required>
                            <option value="">Seleccione</option>
                            <option th:each="estado : ${estados}" th:value="${estado.idEstado}" th:text="${estado.nombreEstado}">Activo</option>
                        </select>
                    </div>
                    <div class="form-actions full-row">
                        <button class="btn btn-success" type="submit"><i class="fa-solid fa-user-plus"></i> Asignar</button>
                    </div>
                </form>
            </section>

            <section class="admin-panel">
                <div class="table-responsive">
                    <table class="table admin-table align-middle">
                        <thead>
                            <tr>
                                <th>Guía</th>
                                <th>Fecha asignación</th>
                                <th>Estado</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${asignaciones == null or asignaciones.empty}">
                                <td colspan="4" class="empty-row">No hay guías asignados.</td>
                            </tr>
                            <tr th:each="asignacion : ${asignaciones}">
                                <td th:text="${asignacion.guia != null and asignacion.guia.usuario != null ? asignacion.guia.usuario.nombre + ' ' + asignacion.guia.usuario.apellidoPaterno : 'Guía'}">Guía</td>
                                <td th:text="${asignacion.fechaAsignacion != null ? #temporals.format(asignacion.fechaAsignacion, 'dd/MM/yyyy HH:mm') : 'Sin fecha'}">Fecha</td>
                                <td th:text="${asignacion.estado != null ? asignacion.estado.nombreEstado : 'Sin estado'}">Activo</td>
                                <td class="text-end">
                                    <form th:action="@{/admin/actividades/{id}/guias/eliminar(id=${idActividad})}" method="post">
                                        <input type="hidden" name="idGuia" th:value="${asignacion.guia.idGuia}"/>
                                        <button class="btn btn-sm btn-outline-danger" type="submit">
                                            <i class="fa-solid fa-trash"></i> Remover
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <th:block th:replace="~{aglo/fragmentos :: scripts('dashboard.js')}"></th:block>
    </body>
</html>
