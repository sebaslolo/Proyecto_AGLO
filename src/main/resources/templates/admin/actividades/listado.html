<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{aglo/fragmentos :: head('Actividades | AGLO', 'dashboard.css')}"></head>
    <body class="admin-page">
        <header th:replace="~{admin/fragmentos :: nav}"></header>
        <main class="admin-main">
            <section class="admin-page-title">
                <div>
                    <h1>Actividades</h1>
                    <p>Oferta turística disponible para reservaciones.</p>
                </div>
                <a class="btn btn-light" th:href="@{/admin/actividades/nueva}">
                    <i class="fa-solid fa-plus"></i> Nueva actividad
                </a>
            </section>
            <section th:replace="~{admin/fragmentos :: mensajes}"></section>

            <section class="admin-panel">
                <form class="search-form mb-3" th:action="@{/admin/actividades/listado}" method="get">
                    <input class="form-control form-control-sm" type="search" name="q" th:value="${q}" placeholder="Buscar actividad"/>
                    <button class="btn btn-sm btn-outline-dark" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                </form>
                <div class="table-responsive">
                    <table class="table admin-table align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Tipo</th>
                                <th>Inicio</th>
                                <th>Fin</th>
                                <th>Cupo</th>
                                <th>Precio</th>
                                <th>Estado</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${actividades == null or actividades.empty}">
                                <td colspan="9" class="empty-row">No hay actividades registradas.</td>
                            </tr>
                            <tr th:each="actividad : ${actividades}">
                                <td th:text="${actividad.idActividad}">1</td>
                                <td th:text="${actividad.nombreActividad}">Tour</td>
                                <td th:text="${actividad.tipoActividad != null ? actividad.tipoActividad.nombreTipoActividad : 'Sin tipo'}">Tipo</td>
                                <td th:text="${actividad.fechaHoraInicio != null ? #temporals.format(actividad.fechaHoraInicio, 'dd/MM/yyyy HH:mm') : 'Sin fecha'}">Fecha</td>
                                <td th:text="${actividad.fechaHoraFin != null ? #temporals.format(actividad.fechaHoraFin, 'dd/MM/yyyy HH:mm') : 'Sin fecha'}">Fecha</td>
                                <td th:text="${actividad.cupoMaximo}">20</td>
                                <td th:text="${actividad.precioActual != null ? #numbers.formatCurrency(actividad.precioActual) : 'Sin precio'}">₡0</td>
                                <td th:text="${actividad.estado != null ? actividad.estado.nombreEstado : 'Sin estado'}">Activo</td>
                                <td class="text-end">
                                    <a class="btn btn-sm btn-outline-dark" th:href="@{/admin/actividades/{id}/guias/listado(id=${actividad.idActividad})}">
                                        <i class="fa-solid fa-person-hiking"></i> Guías
                                    </a>
                                    <a class="btn btn-sm btn-outline-dark" th:href="@{/admin/actividades/modificar/{id}(id=${actividad.idActividad})}">
                                        <i class="fa-solid fa-pen"></i> Editar
                                    </a>
                                    <button class="btn btn-sm btn-outline-danger" type="button"
                                            data-bs-toggle="modal" data-bs-target="#confirmDeleteModal"
                                            th:data-delete-id="${actividad.idActividad}"
                                            th:data-delete-name="${actividad.nombreActividad}">
                                        <i class="fa-solid fa-trash"></i> Eliminar
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <form th:action="@{/admin/actividades/eliminar}" method="post">
                        <input type="hidden" name="idActividad" id="deleteId"/>
                        <div class="modal-header bg-warning">
                            <h2 class="modal-title fs-5">Confirmar eliminación</h2>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                        </div>
                        <div class="modal-body">
                            <p>¿Desea eliminar <strong id="deleteName">este registro</strong>?</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-danger">Eliminar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <th:block th:replace="~{aglo/fragmentos :: scripts('dashboard.js')}"></th:block>
    </body>
</html>
