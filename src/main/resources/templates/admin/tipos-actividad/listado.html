<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{aglo/fragmentos :: head('Tipos de actividad | AGLO', 'dashboard.css')}"></head>
    <body class="admin-page">
        <header th:replace="~{admin/fragmentos :: nav}"></header>
        <main class="admin-main">
            <section class="admin-page-title">
                <div>
                    <h1>Tipos de actividad</h1>
                    <p>Catalogo base para crear actividades turisticas.</p>
                </div>
                <a class="btn btn-light" th:href="@{/admin/tipos-actividad/nuevo}">Nuevo</a>
            </section>
            <section th:replace="~{admin/fragmentos :: mensajes}"></section>
            <section class="admin-panel">
                <div class="table-responsive">
                    <table class="table admin-table align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Duracion</th>
                                <th>Estado</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${tiposActividad == null or tiposActividad.empty}">
                                <td colspan="6" class="empty-row">No hay tipos de actividad registrados.</td>
                            </tr>
                            <tr th:each="tipo : ${tiposActividad}">
                                <td th:text="${tipo.idTipoActividad}">1</td>
                                <td>
                                    <strong th:text="${tipo.nombreTipoActividad}">Tour</strong>
                                    <small class="d-block" th:text="${tipo.descripcionTipoActividad}">Descripcion</small>
                                </td>
                                <td th:text="${tipo.precioBase != null ? #numbers.formatCurrency(tipo.precioBase) : 'Sin precio'}">0</td>
                                <td th:text="${tipo.duracionEstimada}">2 horas</td>
                                <td th:text="${tipo.estado != null ? tipo.estado.nombreEstado : 'Sin estado'}">Activo</td>
                                <td class="text-end">
                                    <a class="btn btn-sm btn-outline-dark" th:href="@{/admin/tipos-actividad/modificar/{id}(id=${tipo.idTipoActividad})}">Editar</a>
                                    <form class="d-inline" th:action="@{/admin/tipos-actividad/eliminar}" method="post">
                                        <input type="hidden" name="idTipoActividad" th:value="${tipo.idTipoActividad}"/>
                                        <button class="btn btn-sm btn-outline-danger" type="submit">Eliminar</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <th:block th:replace="~{aglo/fragmentos :: scripts('dashboard.js')}"></th:block>
    </body>
</html>
