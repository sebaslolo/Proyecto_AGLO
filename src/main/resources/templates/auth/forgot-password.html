<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{aglo/fragmentos :: head('Recuperar contraseña | AGLO', 'login.css')}"></head>
    <body>
        <section class="fondo">
            <div class="overlay"></div>
            <header class="navbar">
                <div class="logo">
                    <img th:src="@{/img/logoAglo.png}" alt="Logo AGLO"/>
                    <h2>AGLO</h2>
                </div>
                <nav>
                    <a th:href="@{/login}" class="btnLogin">Iniciar Sesión</a>
                    <a th:href="@{/registro}" class="btnRegistro">Registrarse</a>
                </nav>
            </header>
            <main class="contenedor">
                <div class="cardRegistro">
                    <h1>Recuperar contraseña</h1>
                    <p>La recuperación automática todavía no está disponible. Contacte al administrador de AGLO para restablecer su acceso.</p>
                    <p class="login"><a th:href="@{/login}">Volver al inicio de sesión</a></p>
                </div>
            </main>
        </section>
        <th:block th:replace="~{aglo/fragmentos :: scripts('dashboard.js')}"></th:block>
    </body>
</html>
