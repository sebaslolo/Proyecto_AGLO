<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{aglo/fragmentos :: head('Iniciar Sesión | AGLO', 'login.css')}"></head>

    <body>
        <section class="fondo">
            <div class="overlay"></div>

            <header class="navbar">
                <div class="logo">
                    <img th:src="@{/img/logoAglo.png}" src="/img/logoAglo.png" alt="Logo AGLO"/>
                    <h2>AGLO</h2>
                </div>
                <nav>
                    <a th:href="@{/login}" href="/login" class="btnLogin">Iniciar Sesión</a>
                    <a th:href="@{/registro}" href="/registro" class="btnRegistro">Registrarse</a>
                </nav>
            </header>

            <main class="contenedor">
                <div class="cardRegistro">
                    <h1>Iniciar Sesión</h1>
                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">Error</div>
                    <div th:if="${todoOk}" class="alert alert-success" role="alert" th:text="${todoOk}">Mensaje</div>
                    <form id="formLogin" th:action="@{/login}" th:object="${loginForm}" action="/login" method="post">
                        <div class="grupo">
                            <label for="correo">Correo o usuario</label>
                            <input
                                type="text"
                                id="correo"
                                th:field="*{correo}"
                                placeholder="tatiana.molina o ejemplo@correo.com"/>
                            <small id="errorCorreo" th:text="${#fields.hasErrors('correo')} ? #{error.login} : ''"></small>
                        </div>

                        <div class="grupo">
                            <label for="password">Contraseña</label>
                            <div class="inputPassword">
                                <input
                                type="password"
                                id="password"
                                th:field="*{password}"
                                placeholder="********"/>
                                <i class="fa-regular fa-eye-slash ojo"></i>
                            </div>
                            <small id="errorPassword" th:text="${#fields.hasErrors('password')} ? #{error.login} : ''"></small>
                        </div>

                        <button type="submit" class="btnCrear">
                            Iniciar Sesión
                        </button>

                        <p class="login">
                            <a th:href="@{/forgot-password}" href="/forgot-password">¿Olvidaste tu contraseña?</a>
                        </p>

                        <p class="login">
                            ¿No tienes cuenta?
                            <a th:href="@{/registro}" href="/registro">Regístrate</a>
                        </p>
                    </form>
                </div>
            </main>

            <a th:href="@{/inicio}" href="/inicio" class="flecha" aria-label="Volver al inicio">
                <i class="fa-solid fa-chevron-right"></i>
            </a>
        </section>

        <th:block th:replace="~{aglo/fragmentos :: scripts('login.js')}"></th:block>
    </body>
</html>
